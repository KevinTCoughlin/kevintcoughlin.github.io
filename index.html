    <style>
      /* ── Reset ───────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      /* ── Tokens ──────────────────────────────────── */
      :root {
        color-scheme: light;
        --color-text:      #444;
        --color-muted:     #666;
        --color-faint:     #888;
        --color-separator: #ccc;
        --mono-muted:      #aaa;
        --mono-label:      #bbb;
        --font-mono: 'SF Mono', ui-monospace, 'Fira Code', monospace;
      }

      /* ── Base ────────────────────────────────────── */
      html {
        font-size: 100%;
      }

      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: 'kern' 1, 'liga' 1;
        color: var(--color-text);
        margin: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
        transition: color 0.2s;
      }

      /* ── Background ──────────────────────────────── */
      #bg {
        position: fixed;
        inset: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      #bg.loaded {
        opacity: 1;
      }

      /* ── Layout ──────────────────────────────────── */
      .container {
        position: relative;
        z-index: 1;
        padding: 50px;
        min-height: 100svh;
        width: fit-content;
        min-width: 300px;
        max-width: min(55vw, 700px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(28px) saturate(1.4);
        -webkit-backdrop-filter: blur(28px) saturate(1.4);
        box-shadow: 1px 0 40px rgba(0, 0, 0, 0.06);
      }

      /* ── Typography ──────────────────────────────── */
      h1 {
        font-size: clamp(2.25rem, 5vw + 1rem, 4.5rem);
        font-weight: 600;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 0.4rem;
        white-space: nowrap;
      }

      .role-label {
        font-size: clamp(0.6875rem, 1vw + 0.25rem, 0.875rem);
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-muted);
        margin: 0;
      }

      .manpage {
        font-family: var(--font-mono);
        font-weight: 400;
        font-size: 0.8em;
        opacity: 0.5;
        letter-spacing: 0;
      }

      /* ── Navigation ──────────────────────────────── */
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
      }

      ul li {
        font-size: clamp(0.75rem, 1.5vw, 0.875rem);
        font-weight: 400;
        letter-spacing: 0.01em;
        color: var(--color-faint);
      }

      ul li + li::before {
        content: '·';
        margin: 0 0.6em;
        color: var(--color-separator);
      }

      ul li a {
        background-image: linear-gradient(currentColor, currentColor);
        background-size: 0% 1px;
        background-repeat: no-repeat;
        background-position: left bottom;
        transition: background-size 0.25s ease, color 0.2s;
      }

      ul li a:hover {
        color: var(--color-text);
        background-size: 100% 1px;
      }

      /* ── Fingerprint ─────────────────────────────── */
      .fp-label {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--mono-label);
        margin-right: 0.4em;
        user-select: none;
      }

      .fingerprint {
        margin-top: 1.75rem;
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        letter-spacing: 0.06em;
        color: var(--mono-muted);
        white-space: nowrap;
      }

      .fingerprint a {
        color: inherit;
        transition: color 0.15s;
      }

      .fingerprint a:hover {
        color: var(--color-text);
      }

      /* ── Attribution ─────────────────────────────── */
      .attribution {
        position: fixed;
        bottom: 12px;
        right: 16px;
        z-index: 2;
        font-size: 0.6875rem;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      .attribution:hover {
        opacity: 1;
      }

      .attribution a {
        color: #fff;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      }

      /* ── Motion ──────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }

      /* ── Narrow viewport (any orientation) ───────── */
      @media (max-width: 600px) {
        .container {
          width: 100%;
          min-width: 0;
          max-width: none;
          min-height: auto;
          padding: 36px 28px 40px;
          position: fixed;
          bottom: 0;
          left: 0;
          justify-content: flex-start;
          gap: 1.25rem;
          border-radius: 16px 16px 0 0;
          box-shadow: 0 -1px 40px rgba(0, 0, 0, 0.08);
        }

        h1 {
          font-size: clamp(1.75rem, 8vw, 2.5rem);
          white-space: normal;
        }

        .fingerprint {
          white-space: normal;
        }
      }

      /* ── Medium viewport ──────────────────────────── */
      @media (min-width: 601px) and (max-width: 900px) {
        .container {
          min-width: 0;
          max-width: 52vw;
          padding: 36px;
        }

        .fingerprint {
          white-space: normal;
        }
      }

    <script>
      (function () {
        var API = 'https://bauhaus.cascadiacollections.workers.dev/api';
        var CACHE_LOAD_MS = 50;
        var today = new Date().toISOString().slice(0, 10);
        var dateParam = '?d=' + today;
        var bg = document.getElementById('bg');
        var attribution = document.getElementById('attribution');

        var attrLink = document.createElement('a');
        attrLink.href = 'https://github.com/cascadiacollections/bauhaus';
        attrLink.target = '_blank';
        attrLink.rel = 'noopener noreferrer';
        attrLink.textContent = '🎨 bauhaus';
        attribution.appendChild(attrLink);

        function updateAttribution(title) {
          attrLink.textContent = '🎨 ' + title;
        }

        var loadStart = Date.now();
        var img = new Image();
        img.onload = function () {
          bg.style.backgroundImage = 'url(' + img.src + ')';
          if (Date.now() - loadStart < CACHE_LOAD_MS) {
            bg.style.transition = 'none';
          }
          bg.classList.add('loaded');
        };
        img.onerror = function () {
          bg.parentNode.removeChild(bg);
          attribution.parentNode.removeChild(attribution);
        };
        img.src = API + '/today' + dateParam;

        try {
          var cachedDate = localStorage.getItem('bg-date');
          var cachedTitle = localStorage.getItem('bg-title');
          if (cachedDate === today && cachedTitle) {
            updateAttribution(cachedTitle);
            return;
          }
        } catch (_e) {
          /* localStorage unavailable */
        }

        fetch(API + '/today.json' + dateParam)
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data && data.title) {
              try {
                localStorage.setItem('bg-date', today);
                localStorage.setItem('bg-title', data.title);
              } catch (_e) {
                /* localStorage unavailable */
              }
              updateAttribution(data.title);
            }
          })
          .catch(function () {
            /* attribution is non-critical */
          });
      })();
    </script>
