<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="me" href="https://keyoxide.org/5261704E7C5C2D39F49786C1F94A3D5EBF8567C4" />
    <title>Kevin Coughlin</title>
    <style>
      a {
        color: inherit;
      }
      li:nth-of-type(1):hover {
        color: #f65314;
      }

      li:nth-of-type(2):hover {
        color: #7cbb00;
      }

      li:nth-of-type(3):hover {
        color: #00a1f1;
      }

      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      ul li {
        padding-top: 5px;
        padding-bottom: 5px;
      }

      .container {
        position: relative;
        z-index: 1;
        padding: 50px;
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      html,
      body {
        font-family:
          'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial,
          'Lucida Grande', sans-serif;
        font-weight: 300;
        color: #444;
        margin: 0;
        padding: 0;
        height: 100%;
      }

      #bg {
        position: fixed;
        top: 0;
        right: 0;
        width: 60%;
        height: 100%;
        background-size: cover;
        background-position: center right;
        background-repeat: no-repeat;
        z-index: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      #bg.loaded {
        opacity: 1;
      }

      #bg::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, #fff, transparent);
        z-index: 1;
      }

      .attribution {
        position: fixed;
        bottom: 8px;
        right: 12px;
        z-index: 1;
        font-size: 11px;
        opacity: 0.5;
        transition: opacity 0.2s;
      }

      .attribution:hover {
        opacity: 0.9;
      }

      .attribution a {
        color: #666;
        text-decoration: none;
      }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-05KMX1JGS4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-05KMX1JGS4');
    </script>
  </head>
  <body>
    <div id="bg"></div>
    <div class="container">
      <h1>Kevin Coughlin</h1>
      <p>Software Engineer</p>
      <ul>
        <li>
          <a href="https://github.com/KevinTCoughlin" target="_blank" rel="noopener">Github</a>
        </li>
        <li>
          <a href="https://www.linkedin.com/in/kevintcoughlin" target="_blank" rel="noopener"
            >LinkedIn</a
          >
        </li>
        <li>
          <a href="https://twitter.com/kevintcoughlin" target="_blank" rel="noopener">Twitter</a>
        </li>
      </ul>
    </div>
    <div id="attribution" class="attribution"></div>
    <script>
      (function () {
        var API = 'https://bauhaus.cascadiacollections.workers.dev/api';
        var CACHE_LOAD_MS = 50;
        var today = new Date().toISOString().slice(0, 10);
        var dateParam = '?d=' + today;
        var bg = document.getElementById('bg');
        var attribution = document.getElementById('attribution');

        function renderAttribution(title) {
          var el = document.getElementById('attribution');
          if (!el) return;
          var link = document.createElement('a');
          link.href = 'https://github.com/cascadiacollections/bauhaus';
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = '🎨 ' + title;
          el.appendChild(link);
        }

        var loadStart = Date.now();
        var img = new Image();
        img.onload = function () {
          bg.style.backgroundImage = 'url(' + img.src + ')';
          if (Date.now() - loadStart < CACHE_LOAD_MS) {
            bg.style.transition = 'none';
          }
          bg.classList.add('loaded');
        };
        img.onerror = function () {
          bg.parentNode.removeChild(bg);
          attribution.parentNode.removeChild(attribution);
        };
        img.src = API + '/today' + dateParam;

        try {
          var cachedDate = localStorage.getItem('bg-date');
          var cachedTitle = localStorage.getItem('bg-title');
          if (cachedDate === today && cachedTitle) {
            renderAttribution(cachedTitle);
            return;
          }
        } catch (_e) {
          /* localStorage unavailable */
        }

        fetch(API + '/today.json' + dateParam)
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data && data.title) {
              try {
                localStorage.setItem('bg-date', today);
                localStorage.setItem('bg-title', data.title);
              } catch (_e) {
                /* localStorage unavailable */
              }
              renderAttribution(data.title);
            }
          })
          .catch(function () {
            /* attribution is non-critical */
          });
      })();
    </script>
