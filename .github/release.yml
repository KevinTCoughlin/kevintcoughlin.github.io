changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: 🚀 Features
      labels: ['enhancement', 'feat']
    - title: 🐛 Fixes
      labels: ['bug', 'fix']
    - title: 🔒 Security
      labels: ['security']
    - title: ⚡ Performance / SEO / A11y
      labels: ['perf', 'seo', 'a11y']
    - title: 🏗️ CI & Tooling
      labels: ['ci', 'chore']
    - title: 📦 Dependencies
      labels: ['dependencies']
    - title: 📝 Other
      labels: ['*']
