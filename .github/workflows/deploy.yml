name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends imagemagick

      - name: Sync favicon from Gravatar
        env:
          GRAVATAR_EMAIL: ${{ secrets.GRAVATAR_EMAIL }}
        run: bash scripts/sync-favicon.sh

      - name: Stage site assets
        run: bash scripts/stage-site.sh _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
