name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    # Weekly link-rot check + devcontainer smoke test (Mondays 09:00 UTC)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Stage site assets
        run: bash scripts/stage-site.sh _site

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  links:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache --max-cache-age 1d
            --no-progress
            --root-dir ${{ github.workspace }}
            --exclude '^http://localhost'
            --accept 200,206,301,302,403,429
            'index.html' 'README.md' 'sitemap.xml'
          fail: true

  devcontainer:
    name: Devcontainer smoke test
    # Run on weekly schedule + manual dispatch only. Catches devcontainer
    # rot (broken base image, missing tool, postCreate regression) without
    # paying the cost on every PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Build devcontainer and validate
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            set -e
            node --version
            bun --version
            bun install --frozen-lockfile
            bun run validate
            bash scripts/stage-site.sh _site
            test -f _site/index.html
