# Preinstall environment for the Copilot Coding Agent so it can work offline.
# Docs: https://docs.github.com/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent
name: 'Copilot setup steps'

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable
