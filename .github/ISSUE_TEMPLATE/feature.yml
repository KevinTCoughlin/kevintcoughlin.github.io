name: Idea / improvement
description: Suggest a polish or improvement to the site.
labels: ['enhancement']
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does **not** require introducing a framework or build step
        - label: This does **not** add a backend / server component
